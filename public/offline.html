<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Africa 2026 Safari - Offline</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f6f2e8;
        color: #1f3a35;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .card {
        width: min(90vw, 520px);
        background: #fff;
        border: 1px solid #e0d3b8;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 6px 24px rgba(31, 58, 53, 0.08);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.5rem;
      }
      p {
        margin: 0;
        line-height: 1.45;
      }
      .hint {
        margin-top: 12px;
        font-size: 0.95rem;
        color: #355954;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Offline Mode Active</h1>
      <p>
        You are currently offline. Your cached trip pack — itinerary, photos, and the last weather
        forecast — should still be available.
      </p>
      <p class="hint">
        Open the site once on Wi‑Fi before heading to camp so the trip pack can download (~80 MB in
        the background). Reconnect to refresh forecasts.
      </p>
    </main>
  </body>
</html>
